name: Build RTPPlugin

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build plugin
        run: mvn clean package

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: RTPPlugin
          path: target/RTPPlugin.jar
