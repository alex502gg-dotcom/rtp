teleport:
  world: world
  attempts: 80
  cooldown-seconds: 10
  avoid-liquids: true
  low:
    min-radius: 400
    max-radius: 500
  high:
    min-radius: 1000
    max-radius: 5000
  near:
    radius: 10000
    min-distance-from-target: 16

messages:
  prefix: '&6[RTP]&r '
  no-permission: '&cУ тебя нет прав на эту команду.'
  only-player: '&cЭта команда доступна только игроку.'
  reloaded: '&aПлагин перезагружен.'
  cooldown: '&cПодожди ещё &e%seconds% сек.&c перед следующей телепортацией.'
  searching: '&eИщу безопасное место...'
  teleported: '&aТы телепортирован на координаты &e%x% &a/&e %y% &a/&e %z%&a.'
  failed: '&cНе удалось найти безопасное место. Попробуй ещё раз.'
  no-targets: '&cНет подходящих игроков для телепортации рядом.'
  already-searching: '&cТелепортация уже ищется, подожди немного.'
  help:
    - '&6/rtp &7- открыть меню телепортов'
    - '&6/rtp low &7- телепорт на 400-500 блоков'
    - '&6/rtp high &7- телепорт на 1000-5000 блоков'
    - '&6/rtp near &7- телепорт рядом с игроком в радиусе 10000 блоков'
    - '&6/rtp help &7- помощь'
    - '&6/rtp reload &7- перезагрузка плагина'
